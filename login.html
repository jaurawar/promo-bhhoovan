<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Stootap Client Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0d0f14;
      --surface: #13151c;
      --panel: #1a1d26;
      --border: #2a2d3a;
      --gold: #c9a84c;
      --gold-dim: rgba(201,168,76,0.15);
      --text: #e8e6e0;
      --muted: #6b6e7e;
      --error: #e05a5a;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--ink);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* Background grid pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 800px; height: 600px;
      background: radial-gradient(ellipse, rgba(201,168,76,0.05) 0%, transparent 65%);
      pointer-events: none;
    }

    .login-card {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease both;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-mark {
      width: 52px; height: 52px;
      border: 1.5px solid var(--gold);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; font-weight: 700;
      color: var(--gold);
      margin: 0 auto 12px;
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 600;
      color: var(--text);
    }

    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .card-header .tag {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
      display: block;
    }

    .card-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px; font-weight: 600;
      margin-bottom: 6px;
    }

    .card-header p {
      font-size: 14px;
      color: var(--muted);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .form-group input {
      width: 100%;
      padding: 13px 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-dim);
    }

    .form-group input::placeholder { color: var(--muted); opacity: 0.6; }
    .form-group input.input-error { border-color: var(--error); }

    .error-msg {
      font-size: 12px;
      color: var(--error);
      margin-top: 5px;
    }

    .alert-error {
      padding: 12px 16px;
      background: rgba(224,90,90,0.08);
      border: 1px solid rgba(224,90,90,0.3);
      border-radius: 8px;
      font-size: 13px;
      color: var(--error);
      margin-bottom: 20px;
      display: none;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--gold);
      color: var(--ink);
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
    }

    .submit-btn:hover {
      background: #d4b05a;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(201,168,76,0.25);
    }

    .submit-btn.loading {
      pointer-events: none;
      opacity: 0.75;
    }

    .card-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--muted);
    }

    .card-footer a { color: var(--gold); text-decoration: none; font-weight: 500; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0;
      color: var(--muted);
      font-size: 12px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Demo admin badge */
    .demo-hint {
      margin-top: 20px;
      padding: 12px 16px;
      background: rgba(201,168,76,0.06);
      border: 1px dashed rgba(201,168,76,0.25);
      border-radius: 8px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    .demo-hint strong { color: var(--gold); }
  </style>
</head>
<body>

<div class="login-card">
  <div class="card-brand">
    <div class="brand-mark">S</div>
    <div class="brand-name">Stootap</div>
  </div>

  <div class="card-header">
    <span class="tag">Client Portal</span>
    <h2>Welcome back</h2>
    <p>Sign in to view your project dashboard</p>
  </div>

  <div class="alert-error" id="loginError">
    Invalid email or password. Please try again.
  </div>

  <form id="loginForm" novalidate>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="your@email.com" />
      <div class="error-msg" id="err-email"></div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" />
      <div class="error-msg" id="err-password"></div>
    </div>

    <button type="submit" class="submit-btn" id="loginBtn">Sign In to Dashboard</button>
  </form>

  <div class="divider">or</div>

  <div style="text-align:center;">
    <a href="admin.html" style="font-size:13px; color:var(--muted); text-decoration:none;">
      🔧 Stootap Team? <span style="color:var(--gold);">Admin Panel →</span>
    </a>
  </div>

  <div class="card-footer" style="margin-top:20px;">
    New client? <a href="register.html">Create your account</a>
  </div>

  <div class="demo-hint">
    <strong>Demo:</strong> Register an account first, then use those credentials to log in.
  </div>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();

    // Clear errors
    ['email','password'].forEach(id => {
      document.getElementById(id).classList.remove('input-error');
      document.getElementById('err-'+id).textContent = '';
    });
    document.getElementById('loginError').style.display = 'none';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    let ok = true;

    if (!email) {
      document.getElementById('email').classList.add('input-error');
      document.getElementById('err-email').textContent = 'Required';
      ok = false;
    }
    if (!password) {
      document.getElementById('password').classList.add('input-error');
      document.getElementById('err-password').textContent = 'Required';
      ok = false;
    }
    if (!ok) return;

    const btn = document.getElementById('loginBtn');
    btn.classList.add('loading');
    btn.textContent = 'Signing in…';

    setTimeout(() => {
      const clients = JSON.parse(localStorage.getItem('stootap_clients') || '[]');
      const client = clients.find(c => c.email === email && atob(c.password_hash) === password);

      if (!client) {
        document.getElementById('loginError').style.display = 'block';
        btn.classList.remove('loading');
        btn.textContent = 'Sign In to Dashboard';
        return;
      }

      localStorage.setItem('stootap_session', JSON.stringify({ client_id: client.client_id, email }));
      window.location.href = 'dashboard.html';
    }, 700);
  });
</script>
</body>
</html>
